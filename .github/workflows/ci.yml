name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        run: pytest backend tests

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: nova-block/package-lock.json
      - name: Install frontend dependencies
        working-directory: nova-block
        run: npm ci
      - name: Lint frontend
        continue-on-error: true
        working-directory: nova-block
        run: npm run lint
      - name: Test frontend
        working-directory: nova-block
        run: npm test -- --run --pool=threads
      - name: Build frontend
        working-directory: nova-block
        run: npm run build

  electron:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - name: Install Electron shell dependencies
        working-directory: electron
        run: npm ci
      - name: Test Electron shell
        working-directory: electron
        run: npm test
